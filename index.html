<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA World Cup 2026 Live Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Poppins:wght@400;500;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-deep: #020617;
      --card-glass: rgba(15, 23, 42, 0.75);
      --neon-gold: #fbbf24;
      --neon-cyan: #22d3ee;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-deep);
      color: var(--text-main);
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    /* WOW Hero Banner Section */
    .hero-banner {
      position: relative;
      height: 320px;
      background-image: linear-gradient(to bottom, rgba(2, 6, 23, 0.3), var(--bg-deep)), 
                        url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=1200');
      background-size: cover;
      background-position: center 35%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 1rem;
      border-bottom: 2px solid rgba(34, 211, 238, 0.2);
    }

    .hero-banner h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 3.5rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #ffffff;
      text-shadow: 0 0 20px rgba(34, 211, 238, 0.6);
      margin-bottom: 0.5rem;
    }

    .hero-banner p {
      color: var(--neon-gold);
      font-size: 1.2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Timezone Switcher Panel */
    .control-panel {
      display: flex;
      justify-content: center;
      margin: -25px dashed transparent;
      position: relative;
      z-index: 10;
      margin-bottom: 3rem;
    }

    .timezone-toggle {
      background: #0f172a;
      padding: 0.5rem;
      border-radius: 50px;
      display: inline-flex;
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .tz-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.7rem 2rem;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 50px;
      transition: all 0.3s ease;
    }

    .tz-btn.active {
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      color: #ffffff;
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.6);
    }

    /* Grid Layout for Match Cards */
    .fixtures-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 2.5rem;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* WOW Card Designs with Background Images */
    .match-card {
      position: relative;
      background-size: cover;
      background-position: center;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 1px solid rgba(255, 255, 255, 0.05);
      min-height: 250px;
    }

    /* Overlay inside card to make text crystal clear */
    .card-overlay {
      background: linear-gradient(to bottom, rgba(15, 23, 42, 0.8), rgba(2, 6, 23, 0.95));
      width: 100%;
      height: 100%;
      padding: 1.8rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: background 0.3s ease;
    }

    .match-card:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 20px 40px rgba(34, 211, 238, 0.25);
      border-color: rgba(34, 211, 238, 0.4);
    }

    .match-card:hover .card-overlay {
      background: linear-gradient(to bottom, rgba(15, 23, 42, 0.7), rgba(2, 6, 23, 0.9));
    }

    /* Meta Info (Group and Day/Date) */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 0.8rem;
      margin-bottom: 1rem;
    }

    .stage-badge {
      background: rgba(251, 191, 36, 0.15);
      border: 1px solid var(--neon-gold);
      color: var(--neon-gold);
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .date-text {
      color: var(--neon-cyan);
      font-weight: 700;
      font-size: 0.9rem;
    }

    /* Big Face-off presentation */
    .vs-arena {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 1.2rem;
    }

    .team-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .team-identity {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .team-flag-emblem {
      background: linear-gradient(135deg, #1e293b, #334155);
      color: #fff;
      font-weight: 800;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .team-name {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    /* Kickoff Clock block */
    .kickoff-block {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 0.6rem;
      text-align: center;
    }

    .match-time {
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      color: #ffffff;
      letter-spacing: 1px;
    }

    .stadium-name {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    @media (max-width: 600px) {
      .hero-banner h1 { font-size: 2.3rem; }
      .fixtures-container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="hero-banner">
    <h1>FIFA World Cup 2026</h1>
    <p>⚡ Official Match Center ⚡</p>
  </header>

  <div class="control-panel">
    <div class="timezone-toggle">
      <button class="tz-btn active" id="btn-ist" onclick="toggleZone('IST')">IST (India Time)</button>
      <button class="tz-btn" id="btn-gcc" onclick="toggleZone('GCC')">GCC (Gulf Time)</button>
    </div>
  </div>

  <main class="fixtures-container" id="match-grid">
    </main>

  <script>
    // Premium Match Data Structure with Real Stadium Photography Mapped from Unsplash
    const wcMatches = [
      {
        stage: "Group A • Opener",
        stadium: "Estadio Azteca, Mexico City",
        bgPhoto: "https://images.unsplash.com/photo-1510051646316-c3f272a0c4a2?q=80&w=500",
        t1: "Mexico", code1: "MEX",
        t2: "South Africa", code2: "RSA",
        IST: { dayDate: "Friday, June 12", clock: "12:30 AM" },
        GCC: { dayDate: "Thursday, June 11", clock: "10:00 PM" }
      },
      {
        stage: "Group A Match",
        stadium: "Estadio Guadalajara, Jalisco",
        bgPhoto: "https://images.unsplash.com/photo-1504155883335-c07b424be16e?q=80&w=500",
        t1: "South Korea", code1: "KOR",
        t2: "Czech Republic", code2: "CZE",
        IST: { dayDate: "Friday, June 12", clock: "07:30 AM" },
        GCC: { dayDate: "Friday, June 12", clock: "05:00 AM" }
      },
      {
        stage: "Group B • Canada Opener",
        stadium: "Toronto Stadium, Toronto",
        bgPhoto: "https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?q=80&w=500",
        t1: "Canada", code1: "CAN",
        t2: "Bosnia & Herzo.", code2: "BIH",
        IST: { dayDate: "Saturday, June 13", clock: "12:30 AM" },
        GCC: { dayDate: "Friday, June 12", clock: "10:00 PM" }
      },
      {
        stage: "Group D • USA Opener",
        stadium: "SoFi Stadium, Los Angeles",
        bgPhoto: "https://images.unsplash.com/photo-1577223625856-75891274cb56?q=80&w=500",
        t1: "United States", code1: "USA",
        t2: "Paraguay", code2: "PAR",
        IST: { dayDate: "Saturday, June 13", clock: "06:30 AM" },
        GCC: { dayDate: "Saturday, June 13", clock: "04:00 AM" }
      },
      {
        stage: "Group B Match",
        stadium: "Levi's Stadium, San Francisco",
        bgPhoto: "https://images.unsplash.com/photo-1569515591253-ce0587db24aad?q=80&w=500",
        t1: "Qatar", code1: "QAT",
        t2: "Switzerland", code2: "SUI",
        IST: { dayDate: "Sunday, June 14", clock: "12:30 AM" },
        GCC: { dayDate: "Saturday, June 13", clock: "10:00 PM" }
      },
      {
        stage: "Group C Match",
        stadium: "MetLife Stadium, New York NJ",
        bgPhoto: "https://images.unsplash.com/photo-1486282424010-a13157c22974?q=80&w=500",
        t1: "Brazil", code1: "BRA",
        t2: "Morocco", code2: "MAR",
        IST: { dayDate: "Sunday, June 14", clock: "03:30 AM" },
        GCC: { dayDate: "Sunday, June 14", clock: "01:00 AM" }
      }
    ];

    function drawInterface(selectedZone) {
      const grid = document.getElementById('match-grid');
      grid.innerHTML = ''; // Clear previous components

      wcMatches.forEach(item => {
        const schedule = item[selectedZone];

        const card = document.createElement('div');
        card.className = 'match-card';
        card.style.backgroundImage = `url('${item.bgPhoto}')`;

        card.innerHTML = `
          <div class="card-overlay">
            <div>
              <div class="card-header">
                <span class="stage-badge">${item.stage}</span>
                <span class="date-text">${schedule.dayDate}</span>
              </div>
              
              <div class="vs-arena">
                <div class="team-line">
                  <div class="team-identity">
                    <div class="team-flag-emblem">${item.code1}</div>
                    <span class="team-name">${item.t1}</span>
                  </div>
                </div>
                <div class="team-line">
                  <div class="team-identity">
                    <div class="team-flag-emblem">${item.code2}</div>
                    <span class="team-name">${item.t2}</span>
                  </div>
                </div>
              </div>
            </div>

            <div class="kickoff-block">
              <div class="match-time">${schedule.clock}</div>
              <div class="stadium-name">📍 ${item.stadium}</div>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function toggleZone(zoneName) {
      document.getElementById('btn-ist').classList.remove('active');
      document.getElementById('btn-gcc').classList.remove('active');

      if (zoneName === 'IST') {
        document.getElementById('btn-ist').classList.add('active');
      } else {
        document.getElementById('btn-gcc').classList.add('active');
      }

      drawInterface(zoneName);
    }

    // Default initialization load to India Standard Time
    drawInterface('IST');
  </script>
</body>
</html>
