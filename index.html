<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>FIFA World Cup 2026 · Fixtures</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04060E;--bg2:#08101F;--bg3:#0C1628;
  --card:rgba(255,255,255,0.04);--card2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --green:#00E676;--green-dim:rgba(0,230,118,0.12);
  --gold:#FFD700;--gold-dim:rgba(255,215,0,0.12);
  --red:#FF453A;--red-dim:rgba(255,69,58,0.12);
  --blue:#2979FF;--blue-dim:rgba(41,121,255,0.12);
  --text:#E8EDF5;--muted:#4A5A7A;--muted2:#8A9BC0;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
.tz-toggle-btn{background:var(--blue);color:white;border:none;padding:12px 24px;border-radius:20px;cursor:pointer;margin:15px;font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;}
.hero{position:relative;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px 20px;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 120% 80% at 50% 60%,#0A1F4A 0%,var(--bg) 70%);}
.hero-content{position:relative;z-index:2}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(80px,28vw,220px);color:var(--text);line-height:0.85;letter-spacing:-2px;margin-bottom:12px;}
.hero-title span{color:var(--green)}
.cta-btn{background:var(--green);color:var(--bg);border:none;border-radius:100px;padding:14px 40px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}
.sticky-nav{position:sticky;top:0;z-index:200;background:rgba(4,6,14,0.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border2);overflow-x:auto;white-space:nowrap;}
.nbtn{background:none;border:none;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;padding:16px 18px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;}
.nbtn.active{color:var(--green);border-bottom-color:var(--green)}
.tab{display:none}.tab.active{display:block}
.section{padding:28px 16px 40px;max-width:860px;margin:0 auto}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:10px}
.mc-top{display:flex;justify-content:space-between;padding:8px 14px;background:rgba(255,255,255,0.025);border-bottom:1px solid var(--border);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;}
.mc-body{display:grid;grid-template-columns:1fr 90px 1fr;align-items:center;padding:16px 12px;gap:6px}
.team-side{display:flex;flex-direction:column;align-items:center;gap:8px}
.team-flag{font-size:40px}
.team-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text);}
.mc-center{display:flex;flex-direction:column;align-items:center;gap:4px}
.mc-time{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--green)}
.mc-ist{font-size:9px;color:var(--muted);text-transform:uppercase}
.mc-bottom{padding:8px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
</style>
</head>
<body>

<div style="text-align:center; background:#08101F;">
    <button class="tz-toggle-btn" onclick="toggleTimezone()">Mode: <span id="tzLabel">IST</span> (Click to switch)</button>
</div>

<section class="hero" id="top">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <div class="hero-title">20<span>26</span></div>
    <button class="cta-btn" onclick="document.getElementById('nav').scrollIntoView({behavior:'smooth'})">View Fixtures</button>
  </div>
</section>

<nav class="sticky-nav" id="nav">
  <div class="nav-inner" style="display:flex; justify-content:center;">
    <button class="nbtn active" onclick="showTab('bydate',this)">Matches</button>
  </div>
</nav>

<div id="tab-bydate" class="tab active">
  <div class="section">
    <div id="byDateContent"></div>
  </div>
</div>

<script>
// 1. STATE & TOGGLE
let currentTZ = 'IST'; 
function toggleTimezone() {
    currentTZ = currentTZ === 'IST' ? 'GCC' : 'IST';
    document.getElementById('tzLabel').innerText = currentTZ;
    renderByDate();
}

// 2. TIME & DATE CALCULATION
function getFormattedTime(dateStr, timeStr) {
    // 2026 Context
    const d = new Date(`${dateStr}, 2026 ${timeStr}`);
    
    // GCC Offset: IST is UTC+5:30, GCC is UTC+4. Subtract 90 mins for GCC.
    if (currentTZ === 'GCC') {
        d.setMinutes(d.getMinutes() - 90);
    }
    
    const day = d.toLocaleDateString('en-US', { weekday: 'short' });
    const time = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    return { day, time };
}

// 3. CARD COMPONENT
function mkCard(m) {
    const { day, time } = getFormattedTime(m.date, m.time);
    return `<div class="mc">
        <div class="mc-top"><span>MATCH #${m.no}</span><span>${day}, ${m.date}</span></div>
        <div class="mc-body">
            <div class="team-side"><div class="team-flag">${m.h}</div><div class="team-name">${m.hn}</div></div>
            <div class="mc-center"><div class="mc-time">${time}</div><div class="mc-ist">${currentTZ}</div></div>
            <div class="team-side"><div class="team-flag">${m.a}</div><div class="team-name">${m.an}</div></div>
        </div>
        <div class="mc-bottom">📍 ${m.venue}</div>
    </div>`;
}

// 4. DATA 
const MATCHES = [
    {no:1, date:"Jun 11", time:"12:30 AM", h:"🇲🇽", hn:"Mexico", a:"🇿🇦", an:"South Africa", venue:"Estadio Azteca"},
    {no:2, date:"Jun 12", time:"7:30 AM", h:"🇰🇷", hn:"South Korea", a:"🇨🇿", an:"Czechia", venue:"Estadio Akron"}
];

// 5. RENDER
function renderByDate() {
    const container = document.getElementById('byDateContent');
    container.innerHTML = MATCHES.map(m => mkCard(m)).join('');
}

function showTab(id, btn) {
    document.querySelectorAll('.nbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

renderByDate();
</script>
</body>
</html>
